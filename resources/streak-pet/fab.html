        <!DOCTYPE html>
        <html lang="ru">
        <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <style>
                :root {
                    --bg-start: #F9B746;
                    --bg-end: #FFF8E8;
                    --accent: #8D4A00;
                    --accent-secondary: #FFF2C8;
                    --pet-start: #FFCB68;
                    --pet-end: #FF9C24;
                }

                * {
                    box-sizing: border-box;
                    -webkit-tap-highlight-color: transparent;
                    user-select: none;
                }

                html, body {
                    width: 100%;
                    height: 100%;
                    margin: 0;
                    overflow: hidden;
                    background: transparent;
                }

                body {
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                }

                .orb {
                    position: relative;
                    width: 76px;
                    height: 76px;
                }

                .pet {
                    position: absolute;
                    left: 50%;
                    top: 50%;
                    width: 46px;
                    height: 46px;
                    transform: translate(-50%, -56%);
                }

                .pet-media {
                    position: absolute;
                    inset: 0;
                    width: 100%;
                    height: 100%;
                    pointer-events: none;
                    object-fit: contain;
                    background-color: transparent;
                    z-index: 2;
                    opacity: 0;
                    transition: opacity .18s ease;
                }
            </style>
        </head>
        <body>
            <div class="orb">
                <div class="pet" id="pet">
                    <video class="pet-media" id="pet-video" muted loop autoplay playsinline preload="metadata"></video>
                </div>
            </div>

            <script>
                var currentMediaSrc = null;
                var petVideo = document.getElementById('pet-video');

                function stopVideo() {
                    try {
                        petVideo.pause();
                    } catch (_) {}
                    petVideo.removeAttribute('src');
                    petVideo.style.opacity = '0';
                    petVideo.load();
                }

                function applyMedia(mediaSrc) {
                    var playPromise;

                    if (currentMediaSrc === mediaSrc) {
                        if (mediaSrc) {
                            playPromise = petVideo.play();
                            if (playPromise && typeof playPromise.catch === 'function') {
                                playPromise.catch(function() {});
                            }
                        }
                        return;
                    }

                    currentMediaSrc = mediaSrc;

                    if (mediaSrc) {
                        petVideo.onloadeddata = function() {
                            petVideo.style.opacity = '1';
                        };
                        petVideo.onerror = function() {
                            stopVideo();
                        };
                        petVideo.src = mediaSrc;
                        petVideo.load();
                        playPromise = petVideo.play();
                        if (playPromise && typeof playPromise.catch === 'function') {
                            playPromise.catch(function() {});
                        }
                        return;
                    }

                    stopVideo();
                }

                window.applyState = function(state) {
                    var root = document.documentElement;
                    root.style.setProperty('--bg-start', state.gradientStart);
                    root.style.setProperty('--bg-end', state.gradientEnd);
                    root.style.setProperty('--pet-start', state.petStart);
                    root.style.setProperty('--pet-end', state.petEnd);
                    root.style.setProperty('--accent', state.accent);
                    root.style.setProperty('--accent-secondary', state.accentSecondary);
                    applyMedia(state.mediaSrc || '');
                };
            </script>
        </body>
        </html>
